name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest       # Apple Silicon
            target: bun-darwin-arm64
            artifact: drift-macos-arm64

          - os: macos-13           # Intel
            target: bun-darwin-x64
            artifact: drift-macos-x64

          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: drift-linux-x64

          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: drift-linux-arm64

          - os: windows-latest
            target: bun-windows-x64
            artifact: drift-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Prebuild stubs
        run: bun run scripts/prebuild.ts

      - name: Build binary
        shell: bash
        run: |
          bun build --compile --minify --bytecode \
            --target=${{ matrix.target }} \
            src/index.ts \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Make Linux / macOS binaries executable
        run: chmod +x dist/drift-linux-* dist/drift-macos-* 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Installation

            Download the binary for your platform below and make it executable:

            ```bash
            # macOS (Apple Silicon)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/drift-macos-arm64 -o drift
            chmod +x drift && sudo mv drift /usr/local/bin/

            # macOS (Intel)
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/drift-macos-x64 -o drift
            chmod +x drift && sudo mv drift /usr/local/bin/

            # Linux x64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/drift-linux-x64 -o drift
            chmod +x drift && sudo mv drift /usr/local/bin/
            ```

            **Chromium is required separately** — run once after download:
            ```bash
            npx playwright install chromium
            ```
